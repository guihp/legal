# Desabilita verificação de JWT para o proxy de imagens do Google Drive
# Esta função serve apenas imagens públicas do Google Drive e precisa ser acessível por tags <img>
[functions.google-drive-proxy]
verify_jwt = false
[functions.capture-public-lead]
enabled = true
verify_jwt = true
import_map = "./functions/capture-public-lead/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/capture-public-lead/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/capture-public-lead/*.html" ]
